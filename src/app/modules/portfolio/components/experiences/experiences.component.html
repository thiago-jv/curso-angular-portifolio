<section id="experiencia" class="experiences" aria-labelledby="experiences-title">
  <div class="container">
    <div class="section-heading section-heading--row">
      <div>
        <p class="section-kicker">Trajetória</p>
        <h2 id="experiences-title">Experiência profissional</h2>
      </div>
      <p class="experiences__total">{{ totalDev() }}</p>
    </div>

    <div class="experiences__list">
      @for (item of arrayExperiences(); track item.summary.strong + item.summary.p) {
      <details>
        <summary>
          <span class="experiences__summary">
            <strong>{{ item.summary.strong }}</strong>
            <span class="period-row">
              <span>{{ item.summary.p }}</span>
              <span class="duration">{{ item.summary.duration }}</span>
            </span>
          </span>
          <span class="summary-action" aria-hidden="true"></span>
        </summary>
        <article [innerHTML]="item.text"></article>
      </details>
      }
    </div>
  </div>
</section>
